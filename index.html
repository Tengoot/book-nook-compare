<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Nook - Porownanie produktow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    line-height: 1.5;
  }

  header {
    text-align: center;
    padding: 2rem 1rem;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-bottom: 2px solid #e94560;
  }

  header h1 {
    font-size: 2rem;
    color: #fff;
    margin-bottom: 0.5rem;
  }

  header p {
    color: #aaa;
    font-size: 0.95rem;
  }

  /* Ranking bar */
  .ranking {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 1rem 0;
  }

  .ranking h2 {
    color: #fff;
    font-size: 1.2rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .ranking-bars {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .ranking-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .ranking-label {
    width: 220px;
    flex-shrink: 0;
    font-size: 0.85rem;
    color: #ccc;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ranking-bar-bg {
    flex: 1;
    height: 28px;
    background: #222;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }

  .ranking-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #f06292);
    border-radius: 6px;
    transition: width 0.6s ease;
    min-width: 0;
  }

  .ranking-votes {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  .products {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 3rem;
  }

  .product-card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #333;
    transition: border-color 0.2s;
  }

  .product-card:hover {
    border-color: #e94560;
  }

  .product-card.voted-for {
    border-color: #4caf50;
    box-shadow: 0 0 0 1px #4caf50;
  }

  .product-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 1.5rem;
    background: #222;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .product-header h2 {
    font-size: 1.25rem;
    color: #fff;
  }

  .product-meta {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .price {
    background: #e94560;
    color: #fff;
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    font-weight: 700;
    font-size: 1rem;
    white-space: nowrap;
  }

  .source {
    color: #aaa;
    font-size: 0.85rem;
  }

  .source a {
    color: #5dade2;
    text-decoration: none;
  }

  .source a:hover {
    text-decoration: underline;
  }

  .product-info {
    padding: 0.75rem 1.5rem;
    color: #bbb;
    font-size: 0.9rem;
    border-bottom: 1px solid #2a2a2a;
  }

  /* Voting */
  .vote-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1rem 1.5rem;
    background: #1e1e1e;
    border-bottom: 1px solid #2a2a2a;
  }

  .vote-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.5rem;
    border: 2px solid #e94560;
    background: transparent;
    color: #e94560;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
  }

  .vote-btn:hover {
    background: #e94560;
    color: #fff;
    transform: scale(1.05);
  }

  .vote-btn.voted {
    background: #4caf50;
    border-color: #4caf50;
    color: #fff;
    cursor: default;
  }

  .vote-btn.voted:hover {
    transform: none;
  }

  .vote-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: #555;
    color: #555;
  }

  .vote-btn.disabled:hover {
    background: transparent;
    color: #555;
    transform: none;
  }

  .vote-count {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    min-width: 80px;
    text-align: center;
  }

  .vote-count span {
    color: #e94560;
    font-size: 1.4rem;
  }

  /* Gallery */
  .gallery-container {
    position: relative;
    padding: 1rem;
  }

  .gallery-main {
    position: relative;
    width: 100%;
    max-width: 600px;
    margin: 0 auto 1rem;
    aspect-ratio: 1;
    background: #111;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
  }

  .gallery-main img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .gallery-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 2;
  }

  .gallery-nav:hover { background: rgba(233,69,96,0.8); }
  .gallery-nav.prev { left: 8px; }
  .gallery-nav.next { right: 8px; }

  .gallery-counter {
    position: absolute;
    bottom: 8px;
    right: 12px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.8rem;
    z-index: 2;
  }

  .gallery-thumbs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 0;
    scrollbar-width: thin;
    scrollbar-color: #444 #1a1a1a;
    justify-content: center;
    flex-wrap: wrap;
  }

  .gallery-thumbs::-webkit-scrollbar { height: 6px; }
  .gallery-thumbs::-webkit-scrollbar-track { background: #1a1a1a; }
  .gallery-thumbs::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  .thumb {
    width: 64px;
    height: 64px;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    flex-shrink: 0;
    transition: border-color 0.15s;
  }

  .thumb.active { border-color: #e94560; }
  .thumb:hover { border-color: #5dade2; }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
  }

  .lightbox-close {
    position: absolute;
    top: 1rem;
    right: 1.5rem;
    background: none;
    border: none;
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .lightbox-nav:hover { background: rgba(233,69,96,0.6); }
  .lightbox-nav.prev { left: 1rem; }
  .lightbox-nav.next { right: 1rem; }

  .lightbox-counter {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 0.9rem;
  }

  .firebase-error {
    max-width: 1400px;
    margin: 1rem auto;
    padding: 1rem;
    background: #2a1a1a;
    border: 1px solid #e94560;
    border-radius: 8px;
    text-align: center;
    color: #e94560;
    display: none;
  }

  @media (max-width: 768px) {
    header h1 { font-size: 1.4rem; }
    .product-header h2 { font-size: 1.05rem; }
    .gallery-main { max-width: 100%; }
    .thumb { width: 48px; height: 48px; }
    .ranking-label { width: 120px; font-size: 0.75rem; }
    .vote-section { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <h1>Book Nook DIY - Porownanie produktow</h1>
  <p>7 modeli miniaturowych domkow &bull; Przejrzyj galerie i zaglosuj na ulubiony!</p>
</header>

<div class="firebase-error" id="firebase-error">
  Glosowanie niedostepne - brak polaczenia z baza danych.
</div>

<div class="ranking" id="ranking-section" style="display:none">

  <div class="ranking-bars" id="ranking-bars"></div>
</div>

<div class="products" id="products"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">

  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<!-- Firebase SDK -->

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script>
// ============================================================
// FIREBASE CONFIG - wklej tutaj swoj config z Firebase Console
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyBQ4oMiJwWXKuWMCoEQbLOXFAvgThrh0vE",
  authDomain: "book-book-voting.firebaseapp.com",
  databaseURL: "https://book-book-voting-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "book-book-voting",
  storageBucket: "book-book-voting.firebasestorage.app",
  messagingSenderId: "471256393591",
  appId: "1:471256393591:web:2d9d93622bca477a496372"
};

let db = null;
let votesRef = null;
let firebaseReady = false;

try {
  if (firebaseConfig.apiKey !== "PLACEHOLDER") {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    votesRef = db.ref('votes');
    firebaseReady = true;
  }
} catch(e) {
  console.error('Firebase init error:', e);
}

// ============================================================

const products = [

  },
  {

    source: "Empik",
    url: "https://www.empik.com/miniaturowy-domek-book-nook-swiat-basniowych-snow-habarri,p1607964258,szkolne-i-papiernicze-p",
    info: "Zestaw kreatywny DIY. Motyw: basniowe sny / fairy tale. Wiek: 8+.",

    info: "Miniaturowy domek DIY. Motyw szkoly magii. Puzzle 3D, dekoracja z oswietleniem LED.",
    images: [
      "images/magic-school/img_0.png",
      "images/magic-school/img_1.jpg",
      "images/magic-school/img_2.jpg",
      "images/magic-school/img_3.png",
      "images/magic-school/img_4.png",
      "images/magic-school/img_5.png",
      "images/magic-school/img_6.png",
      "images/magic-school/img_7.png",
      "images/magic-school/img_8.png",
      "images/magic-school/img_9.png"
    ]
  }
];

// Vote state
const votes = {};
products.forEach(p => votes[p.id] = 0);

function getMyVote() {
  return localStorage.getItem('booknook_vote') || null;
}

function setMyVote(productId) {
  localStorage.setItem('booknook_vote', productId);
}

// ============================================================
// Gallery state & rendering
// ============================================================
const galleryState = {};

function renderProducts() {
  const container = document.getElementById('products');
  const myVote = getMyVote();

  container.innerHTML = products.map((p, pi) => {
    galleryState[pi] = 0;
    const priceHtml = p.oldPrice
      ? `<span class="price"><s style="opacity:0.6;font-weight:400">${p.oldPrice}</s> ${p.price}</span>`
      : `<span class="price">${p.price}</span>`;

    const isVotedFor = myVote === p.id;
    const hasVoted = myVote !== null;
    let btnClass = 'vote-btn';
    let btnText = '&#9734; Glosuj';
    let btnOnclick = `castVote('${p.id}')`;
    if (isVotedFor) {
      btnClass += ' voted';
      btnText = '&#10003; Twoj glos!';
      btnOnclick = '';
    } else if (hasVoted) {
      btnClass += ' disabled';
      btnOnclick = '';
    }

    const voteCount = votes[p.id] || 0;

    return `
    <div class="product-card ${isVotedFor ? 'voted-for' : ''}" id="card-${p.id}">
      <div class="product-header">
        <h2>${p.name}</h2>
        <div class="product-meta">
          ${priceHtml}
          <span class="source"><a href="${p.url}" target="_blank" rel="noopener">${p.source} &nearr;</a></span>
        </div>
      </div>
      <div class="product-info">${p.info}</div>
      <div class="vote-section">
        <button class="${btnClass}" id="vote-btn-${p.id}" ${btnOnclick ? `onclick="${btnOnclick}"` : ''}>${btnText}</button>
        <div class="vote-count" id="vote-count-${p.id}"><span>${voteCount}</span> ${voteCount === 1 ? 'glos' : 'glosow'}</div>
      </div>
      <div class="gallery-container">
        <div class="gallery-main" onclick="openLightbox(${pi})">
          <button class="gallery-nav prev" onclick="event.stopPropagation();navGallery(${pi},-1)">&#8249;</button>
          <img id="main-img-${pi}" src="${p.images[0]}" alt="${p.name}" loading="lazy">
          <button class="gallery-nav next" onclick="event.stopPropagation();navGallery(${pi},1)">&#8250;</button>
          <div class="gallery-counter" id="counter-${pi}">1 / ${p.images.length}</div>
        </div>
        <div class="gallery-thumbs" id="thumbs-${pi}">
          ${p.images.map((img, ii) => `
            <div class="thumb ${ii === 0 ? 'active' : ''}" onclick="goToImage(${pi},${ii})" id="thumb-${pi}-${ii}">
              <img src="${img}" alt="Miniatura ${ii+1}" loading="lazy">
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateVoteUI() {
  const myVote = getMyVote();
  const totalVotes = Object.values(votes).reduce((s, v) => s + v, 0);

  products.forEach(p => {
    const count = votes[p.id] || 0;
    const countEl = document.getElementById(`vote-count-${p.id}`);
    if (countEl) {
      countEl.innerHTML = `<span>${count}</span> ${count === 1 ? 'glos' : 'glosow'}`;
    }

    const btn = document.getElementById(`vote-btn-${p.id}`);
    if (btn) {
      if (myVote === p.id) {
        btn.className = 'vote-btn voted';
        btn.innerHTML = '&#10003; Twoj glos!';
        btn.onclick = null;
      } else if (myVote) {
        btn.className = 'vote-btn disabled';
        btn.onclick = null;
      }
    }

    const card = document.getElementById(`card-${p.id}`);
    if (card) {
      card.classList.toggle('voted-for', myVote === p.id);
    }
  });

  // Update ranking
  updateRanking(totalVotes);
}

function updateRanking(totalVotes) {
  const section = document.getElementById('ranking-section');
  const barsEl = document.getElementById('ranking-bars');
  if (!totalVotes) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  const sorted = products.map(p => ({name: p.name, votes: votes[p.id] || 0}))
    .sort((a, b) => b.votes - a.votes);
  const maxVotes = sorted[0].votes || 1;

  barsEl.innerHTML = sorted.map(item => {
    const pct = Math.round((item.votes / maxVotes) * 100);
    return `
    <div class="ranking-row">
      <div class="ranking-label">${item.name}</div>
      <div class="ranking-bar-bg">
        <div class="ranking-bar-fill" style="width:${pct}%"></div>
        <div class="ranking-votes">${item.votes}</div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// Voting logic
// ============================================================
function castVote(productId) {
  if (getMyVote()) return; // already voted
  if (!firebaseReady) {
    alert('Glosowanie niedostepne - Firebase nie jest skonfigurowany.');
    return;
  }

  const ref = db.ref('votes/' + productId);
  ref.transaction(current => (current || 0) + 1, (error) => {
    if (error) {
      alert('Blad podczas glosowania. Sprobuj ponownie.');
    } else {
      setMyVote(productId);
      updateVoteUI();
    }
  });
}

// ============================================================
// Firebase real-time listener
// ============================================================
function initFirebaseListeners() {
  if (!firebaseReady) {
    document.getElementById('firebase-error').style.display = 'block';
    return;
  }

  votesRef.on('value', snapshot => {
    const data = snapshot.val() || {};
    products.forEach(p => {
      votes[p.id] = data[p.id] || 0;
    });
    updateVoteUI();
  });
}

// ============================================================
// Gallery functions
// ============================================================
function goToImage(pi, ii) {
  const p = products[pi];
  galleryState[pi] = ii;
  document.getElementById(`main-img-${pi}`).src = p.images[ii];
  document.getElementById(`counter-${pi}`).textContent = `${ii+1} / ${p.images.length}`;
  const thumbs = document.getElementById(`thumbs-${pi}`).children;
  for (let t of thumbs) t.classList.remove('active');
  document.getElementById(`thumb-${pi}-${ii}`).classList.add('active');
}

function navGallery(pi, dir) {
  const p = products[pi];
  let idx = galleryState[pi] + dir;
  if (idx < 0) idx = p.images.length - 1;
  if (idx >= p.images.length) idx = 0;
  goToImage(pi, idx);
}

// Lightbox
let lbProduct = 0;
let lbIndex = 0;

function openLightbox(pi) {
  lbProduct = pi;
  lbIndex = galleryState[pi];
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  const p = products[lbProduct];
  lbIndex += dir;
  if (lbIndex < 0) lbIndex = p.images.length - 1;
  if (lbIndex >= p.images.length) lbIndex = 0;
  updateLightbox();
}

function updateLightbox() {
  const p = products[lbProduct];
  document.getElementById('lightbox-img').src = p.images[lbIndex];
  document.getElementById('lightbox-counter').textContent = `${p.name} - ${lbIndex+1} / ${p.images.length}`;
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (lb.classList.contains('open')) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
  }
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// Init
renderProducts();
initFirebaseListeners();
</script>

</body>
</html>

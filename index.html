<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Nook - Porownanie produktow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    line-height: 1.5;
  }

  header {
    text-align: center;
    padding: 2rem 1rem;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-bottom: 2px solid #e94560;
  }

  header h1 {
    font-size: 2rem;
    color: #fff;
    margin-bottom: 0.5rem;
  }

  header p {
    color: #aaa;
    font-size: 0.95rem;
  }

  /* Ranking bar */
  .ranking {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 1rem 0;
  }

  .ranking h2 {
    color: #fff;
    font-size: 1.2rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .ranking-bars {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .ranking-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .ranking-label {
    width: 220px;
    flex-shrink: 0;
    font-size: 0.85rem;
    color: #ccc;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ranking-bar-bg {
    flex: 1;
    height: 28px;
    background: #222;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }

  .ranking-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #f06292);
    border-radius: 6px;
    transition: width 0.6s ease;
    min-width: 0;
  }

  .ranking-votes {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    white-space: nowrap;
    max-width: calc(100% - 20px);
    overflow: hidden;
  }

  .ranking-voters-span {
    opacity: 1;
    transition: opacity 0.3s;
  }

  .products {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 3rem;
  }

  .product-card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #333;
    transition: border-color 0.2s;
  }

  .product-card:hover {
    border-color: #e94560;
  }

  .product-card.voted-for {
    border-color: #4caf50;
    box-shadow: 0 0 0 1px #4caf50;
  }

  .product-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 1.5rem;
    background: #222;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .product-header h2 {
    font-size: 1.25rem;
    color: #fff;
  }

  .product-meta {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .price {
    background: #e94560;
    color: #fff;
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    font-weight: 700;
    font-size: 1rem;
    white-space: nowrap;
  }

  .source {
    color: #aaa;
    font-size: 0.85rem;
  }

  .source a {
    color: #5dade2;
    text-decoration: none;
  }

  .source a:hover {
    text-decoration: underline;
  }

  .product-info {
    padding: 0.75rem 1.5rem;
    color: #bbb;
    font-size: 0.9rem;
    border-bottom: 1px solid #2a2a2a;
  }

  /* Voting */
  .vote-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1rem 1.5rem;
    background: #1e1e1e;
    border-bottom: 1px solid #2a2a2a;
  }

  .vote-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.5rem;
    border: 2px solid #e94560;
    background: transparent;
    color: #e94560;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
  }

  .vote-btn:hover {
    background: #e94560;
    color: #fff;
    transform: scale(1.05);
  }

  .vote-btn.voted {
    background: #4caf50;
    border-color: #4caf50;
    color: #fff;
    cursor: default;
  }

  .vote-btn.voted:hover {
    transform: none;
  }

  .vote-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: #555;
    color: #555;
  }

  .vote-btn.disabled:hover {
    background: transparent;
    color: #555;
    transform: none;
  }

  .vote-count {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    min-width: 80px;
    text-align: center;
  }

  .vote-count span {
    color: #e94560;
    font-size: 1.4rem;
  }

  .retract-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.4rem 0.8rem;
    border: 1px solid #666;
    background: transparent;
    color: #999;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .retract-btn:hover {
    border-color: #e94560;
    color: #e94560;
  }

  .voters-list {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 1.5rem 0.6rem;
    background: #1e1e1e;
    border-bottom: 1px solid #2a2a2a;
  }

  .voter-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    background: #2a2a4a;
    color: #8888cc;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Gallery */
  .gallery-container {
    position: relative;
    padding: 1rem;
  }

  .gallery-main {
    position: relative;
    width: 100%;
    max-width: 600px;
    margin: 0 auto 1rem;
    aspect-ratio: 1;
    background: #111;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
  }

  .gallery-main img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .gallery-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 2;
  }

  .gallery-nav:hover { background: rgba(233,69,96,0.8); }
  .gallery-nav.prev { left: 8px; }
  .gallery-nav.next { right: 8px; }

  .gallery-counter {
    position: absolute;
    bottom: 8px;
    right: 12px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.8rem;
    z-index: 2;
  }

  .gallery-thumbs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 0;
    scrollbar-width: thin;
    scrollbar-color: #444 #1a1a1a;
    justify-content: center;
    flex-wrap: wrap;
  }

  .gallery-thumbs::-webkit-scrollbar { height: 6px; }
  .gallery-thumbs::-webkit-scrollbar-track { background: #1a1a1a; }
  .gallery-thumbs::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  .thumb {
    width: 64px;
    height: 64px;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    flex-shrink: 0;
    transition: border-color 0.15s;
  }

  .thumb.active { border-color: #e94560; }
  .thumb:hover { border-color: #5dade2; }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
  }

  .lightbox-close {
    position: absolute;
    top: 1rem;
    right: 1.5rem;
    background: none;
    border: none;
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .lightbox-nav:hover { background: rgba(233,69,96,0.6); }
  .lightbox-nav.prev { left: 1rem; }
  .lightbox-nav.next { right: 1rem; }

  .lightbox-counter {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 0.9rem;
  }

  /* Code entry */
  .code-gate {
    max-width: 500px;
    margin: 1.5rem auto 0;
    padding: 1.5rem;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 12px;
    text-align: center;
  }

  .code-gate h3 {
    color: #fff;
    margin-bottom: 0.5rem;
    font-size: 1.1rem;
  }

  .code-gate p {
    color: #aaa;
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }

  .code-input-row {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
  }

  .code-input-row input {
    padding: 0.6rem 1rem;
    border: 2px solid #444;
    border-radius: 8px;
    background: #111;
    color: #fff;
    font-size: 1.1rem;
    font-family: monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    width: 200px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .code-input-row input:focus {
    border-color: #e94560;
  }

  .code-input-row button {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 8px;
    background: #e94560;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .code-input-row button:hover {
    background: #c62c4a;
  }

  .code-status {
    margin-top: 0.75rem;
    font-size: 0.9rem;
    min-height: 1.4em;
  }

  .code-status.ok { color: #4caf50; }
  .code-status.err { color: #e94560; }
  .code-status.info { color: #5dade2; }

  .votes-remaining {
    display: inline-block;
    background: #0f3460;
    color: #5dade2;
    padding: 0.2rem 0.7rem;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-left: 0.5rem;
  }

  /* Spoiler button */
  .spoiler-section {
    max-width: 500px;
    margin: 1rem auto 0;
    text-align: center;
  }

  .spoiler-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.5rem;
    border: 2px solid #f0a030;
    background: transparent;
    color: #f0a030;
    border-radius: 30px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
  }

  .spoiler-btn:hover {
    background: #f0a030;
    color: #000;
    transform: scale(1.05);
  }

  .spoiler-btn.active {
    background: #f0a030;
    color: #000;
  }

  /* Hidden results */
  .results-hidden .vote-count {
    visibility: hidden;
  }

  .results-hidden .voters-list {
    display: none;
  }

  .firebase-error {
    max-width: 1400px;
    margin: 1rem auto;
    padding: 1rem;
    background: #2a1a1a;
    border: 1px solid #e94560;
    border-radius: 8px;
    text-align: center;
    color: #e94560;
    display: none;
  }

  @media (max-width: 768px) {
    header h1 { font-size: 1.4rem; }
    .product-header h2 { font-size: 1.05rem; }
    .gallery-main { max-width: 100%; }
    .thumb { width: 48px; height: 48px; }
    .ranking-label { width: 120px; font-size: 0.75rem; }
    .vote-section { flex-wrap: wrap; }
    .code-input-row { flex-direction: column; align-items: center; }
    .code-input-row input { width: 100%; max-width: 200px; }
  }
</style>
</head>
<body>

<header>
  <h1>Book Nook DIY - Porownanie produktow</h1>
  <p>7 modeli miniaturowych domkow &bull; Przejrzyj galerie i zaglosuj na ulubiony!</p>
</header>

<div class="code-gate" id="code-gate">
  <h3>Wpisz swoje imie aby glosowac</h3>
  <p>Masz 2 glosy do oddania. Mozesz tez wycofac glos i zaglosowac na cos innego.</p>
  <div class="code-input-row">
    <input type="text" id="code-input" placeholder="Twoje imie" maxlength="20" autocomplete="off">
    <button onclick="validateCode()">Aktywuj</button>
  </div>
  <div class="code-status" id="code-status"></div>
</div>

<div class="spoiler-section" id="spoiler-section" style="display:none">
  <button class="spoiler-btn" onclick="toggleSpoiler()">&#128065; Spoiler alert! Zobacz wyniki</button>
</div>

<div class="firebase-error" id="firebase-error">
  Glosowanie niedostepne - brak polaczenia z baza danych.
</div>

<div class="ranking" id="ranking-section" style="display:none">
  <h2>Ranking glosowania</h2>
  <div class="ranking-bars" id="ranking-bars"></div>
</div>

<div class="products" id="products"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <button class="lightbox-nav prev" onclick="lightboxNav(-1)">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lightbox-nav next" onclick="lightboxNav(1)">&#8250;</button>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script>
// ============================================================
// FIREBASE CONFIG - wklej tutaj swoj config z Firebase Console
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyBQ4oMiJwWXKuWMCoEQbLOXFAvgThrh0vE",
  authDomain: "book-book-voting.firebaseapp.com",
  databaseURL: "https://book-book-voting-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "book-book-voting",
  storageBucket: "book-book-voting.firebasestorage.app",
  messagingSenderId: "471256393591",
  appId: "1:471256393591:web:2d9d93622bca477a496372"
};

let db = null;
let votesRef = null;
let firebaseReady = false;

try {
  if (firebaseConfig.apiKey !== "PLACEHOLDER") {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    votesRef = db.ref('votes');
    firebaseReady = true;
  }
} catch(e) {
  console.error('Firebase init error:', e);
}

// ============================================================

const products = [
  {
    id: "lotr",
    name: "Wladca Pierscieni - Book Nook",
    price: "206,00 zl",
    source: "Media Expert",
    url: "https://www.mediaexpert.pl/zabawki/zabawki-kolekcjonerskie/modele-do-sklejania/miniaturowy-domek-book-nook-wladca-pierscieni",
    info: "227 elementow. Miniaturowy domek Book Nook z motywem Wladcy Pierscieni.",
    images: Array.from({length:11}, (_,i) => `images/lotr/img_${i}.jpg`)
  },
  {
    id: "fantastic-beasts",
    name: "Fantastyczne Zwierzeta - Cutebee",
    price: "199,00 zl",
    source: "Home&Fun",
    url: "https://homeandfun.com.pl/pl/products/diy-book-nook-fantastyczne-zwierzeta-cutebee-262.html",
    info: "Mechanizm obrotowy, oslona przeciwkurzowa, ilustrowana instrukcja krok po kroku.",
    images: Array.from({length:10}, (_,i) => `images/fantastic-beasts/img_${i}.png`)
  },
  {
    id: "magic-school",
    name: "Szkola Magii - Book Nook Puzzle 3D",
    price: "~149,00 zl",
    source: "Allegro",
    url: "https://allegro.pl/oferta/diy-miniaturowy-domek-szkola-magii-book-nook-puzzle-3d-dekoracja-18280615687",
    info: "Miniaturowy domek DIY. Motyw szkoly magii. Puzzle 3D, dekoracja z oswietleniem LED.",
    images: Array.from({length:5}, (_,i) => `images/magic-school/img_${i}.png`)
  },
  {
    id: "future-world",
    name: "Swiat Przyszlosci - Joincon (HABARRI)",
    price: "~139,00 zl",
    source: "Empik",
    url: "https://www.empik.com/miniaturowy-domek-book-nook-swiat-przyszlosci-joincon-habarri,p1629128928,szkolne-i-papiernicze-p",
    info: "Zestaw kreatywny DIY. Motyw: swiat przyszlosci / sci-fi. Wiek: 8+.",
    images: Array.from({length:10}, (_,i) => `images/future-world/img_${i}.jpg`)
  },
  {
    id: "slytherin",
    name: "Dom Slytherin - Harry Potter DIY 3D",
    price: "199,00 zl",
    oldPrice: "299,99 zl",
    source: "Home&Fun",
    url: "https://homeandfun.com.pl/pl/products/diy-book-nook-dom-slytherin-harry-potter-diy-3d-268.html",
    info: "Zestaw do samodzielnego zlozenia. Oswietlenie LED z wlacznikiem dotykowym. Wymiary ok. 20x14x10cm. Poziom trudnosci: sredni (14+). Instrukcja w jezyku polskim.",
    images: Array.from({length:10}, (_,i) => `images/slytherin/img_${i}.png`)
  },
  {
    id: "fairy-dreams",
    name: "Swiat Basniowych Snow - HABARRI",
    price: "~139,00 zl",
    source: "Empik",
    url: "https://www.empik.com/miniaturowy-domek-book-nook-swiat-basniowych-snow-habarri,p1607964258,szkolne-i-papiernicze-p",
    info: "Zestaw kreatywny DIY. Motyw: basniowe sny / fairy tale. Wiek: 8+.",
    images: Array.from({length:10}, (_,i) => `images/fairy-dreams/img_${i}.jpg`)
  },
  {
    id: "detective",
    name: "Agencja Detektywistyczna - Cutebee",
    price: "199,00 zl",
    source: "Home&Fun",
    url: "https://homeandfun.com.pl/pl/products/agencja-detektywistyczna-cutebee-diy-book-nook-puzzle-3d-prezent-198.html",
    info: "Cofnij sie w czasie, zostan detektywem, zlam kod, przeprowadz rekonstrukcje wydarzen i rozwiaz zagadke!",
    images: Array.from({length:10}, (_,i) => `images/detective/img_${i}.png`)
  }
];

// ============================================================
// Vote state
// ============================================================
const MAX_VOTES = 2;
const votes = {};
products.forEach(p => votes[p.id] = 0);

// Who voted for what: { productId: [{initials:"Ba", full:"Bartek"}, ...] }
const votersByProduct = {};
products.forEach(p => votersByProduct[p.id] = []);

function nameToInitials(name) {
  if (!name) return '??';
  return name.charAt(0) + name.charAt(1).toLowerCase();
}

function nameToDisplay(name) {
  if (!name) return '??';
  // Capitalize first letter, lowercase rest
  return name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
}

// Active code session
let activeCode = null;   // the validated code string
let codeData = null;     // {used: N, votes: [...]}
let spoilerRevealed = false; // spoiler toggle for non-voters

function hasUserVoted() {
  return activeCode && getMyVotes().length > 0;
}

function shouldShowResults() {
  return hasUserVoted() || spoilerRevealed;
}

function toggleSpoiler() {
  spoilerRevealed = !spoilerRevealed;
  const btn = document.querySelector('.spoiler-btn');
  if (spoilerRevealed) {
    btn.classList.add('active');
    btn.innerHTML = '&#128065; Ukryj wyniki';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '&#128065; Spoiler alert! Zobacz wyniki';
  }
  applyResultsVisibility();
}

function applyResultsVisibility() {
  const show = shouldShowResults();
  const productsEl = document.getElementById('products');
  const rankingEl = document.getElementById('ranking-section');

  // Toggle results-hidden class on products container
  if (show) {
    productsEl.classList.remove('results-hidden');
  } else {
    productsEl.classList.add('results-hidden');
  }

  // Ranking: only show when there are votes AND results visible
  const totalVotes = Object.values(votes).reduce((s, v) => s + v, 0);
  if (totalVotes && show) {
    rankingEl.style.display = '';
  } else {
    rankingEl.style.display = 'none';
  }

  // Spoiler button: show only when user hasn't voted yet
  const spoilerEl = document.getElementById('spoiler-section');
  spoilerEl.style.display = hasUserVoted() ? 'none' : '';
}

function getStoredCode() {
  return localStorage.getItem('booknook_code') || null;
}
function setStoredCode(code) {
  localStorage.setItem('booknook_code', code);
}
function getMyVotes() {
  // returns array of product IDs this code voted for
  return codeData ? (codeData.votes || []) : [];
}
function remainingVotes() {
  return MAX_VOTES - getMyVotes().length;
}

// ============================================================
// Code validation
// ============================================================
function validateCode() {
  const input = document.getElementById('code-input');
  const status = document.getElementById('code-status');
  const code = input.value.trim().toUpperCase();

  if (!code) {
    status.className = 'code-status err';
    status.textContent = 'Wpisz kod!';
    return;
  }

  if (!firebaseReady) {
    status.className = 'code-status err';
    status.textContent = 'Brak polaczenia z baza.';
    return;
  }

  status.className = 'code-status info';
  status.textContent = 'Sprawdzam...';

  db.ref('codes/' + code).once('value').then(snap => {
    const data = snap.val();
    if (data === null) {
      status.className = 'code-status err';
      status.textContent = 'Nieprawidlowy kod!';
      return;
    }

    const usedVotes = (data.votes || []).length;
    if (usedVotes >= MAX_VOTES) {
      status.className = 'code-status err';
      status.textContent = 'Ten kod zostal juz w pelni wykorzystany!';
      return;
    }

    // Code is valid
    activeCode = code;
    codeData = { used: data.used || 0, votes: data.votes || [] };
    setStoredCode(code);

    const rem = MAX_VOTES - usedVotes;
    status.className = 'code-status ok';
    status.innerHTML = `Kod aktywny! <span class="votes-remaining">Pozostalo glosow: ${rem}</span>`;
    input.disabled = true;

    renderProducts(); // re-render with active vote buttons
  }).catch(err => {
    status.className = 'code-status err';
    status.textContent = 'Blad sieci. Sprobuj ponownie.';
    console.error(err);
  });
}

// Try restoring code from localStorage on load
function tryRestoreCode() {
  const stored = getStoredCode();
  if (!stored || !firebaseReady) return;

  db.ref('codes/' + stored).once('value').then(snap => {
    const data = snap.val();
    if (data === null) return;

    activeCode = stored;
    codeData = { used: data.used || 0, votes: data.votes || [] };

    const input = document.getElementById('code-input');
    const status = document.getElementById('code-status');
    input.value = stored;
    input.disabled = true;

    const rem = remainingVotes();
    if (rem > 0) {
      status.className = 'code-status ok';
      status.innerHTML = `Kod aktywny! <span class="votes-remaining">Pozostalo glosow: ${rem}</span>`;
    } else {
      status.className = 'code-status ok';
      status.innerHTML = `Wszystkie glosy oddane! Dziekujemy.`;
    }
    renderProducts();
  });
}

// Enter key to validate
document.getElementById('code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') validateCode();
});

// ============================================================
// Gallery state & rendering
// ============================================================
const galleryState = {};

function renderProducts() {
  const container = document.getElementById('products');
  const myVotes = getMyVotes();
  const canVote = activeCode && remainingVotes() > 0;

  container.innerHTML = products.map((p, pi) => {
    galleryState[pi] = 0;
    const priceHtml = p.oldPrice
      ? `<span class="price"><s style="opacity:0.6;font-weight:400">${p.oldPrice}</s> ${p.price}</span>`
      : `<span class="price">${p.price}</span>`;

    const votedCount = myVotes.filter(v => v === p.id).length;
    const isVotedFor = votedCount > 0;

    let btnClass = 'vote-btn';
    let btnText = '&#9734; Glosuj';
    let btnOnclick = `castVote('${p.id}')`;

    if (!activeCode) {
      btnClass += ' disabled';
      btnText = '&#128274; Wpisz imie';
      btnOnclick = '';
    } else if (isVotedFor) {
      btnClass += ' voted';
      btnText = `&#10003; Glos oddany`;
      btnOnclick = '';
    } else if (canVote) {
      // ok, can vote
    } else {
      // no remaining votes
      if (isVotedFor) {
        btnClass += ' voted';
        btnText = `&#10003; Twoj glos (${votedCount})`;
      } else {
        btnClass += ' disabled';
      }
      btnOnclick = '';
    }

    // Retract button
    let retractHtml = '';
    if (activeCode && isVotedFor) {
      retractHtml = `<button class="retract-btn" onclick="retractVote('${p.id}')">&times; Wycofaj glos</button>`;
    }

    const voteCount = votes[p.id] || 0;

    return `
    <div class="product-card ${isVotedFor ? 'voted-for' : ''}" id="card-${p.id}">
      <div class="product-header">
        <h2>${p.name}</h2>
        <div class="product-meta">
          ${priceHtml}
          <span class="source"><a href="${p.url}" target="_blank" rel="noopener">${p.source} &nearr;</a></span>
        </div>
      </div>
      <div class="product-info">${p.info}</div>
      <div class="vote-section">
        <button class="${btnClass}" id="vote-btn-${p.id}" ${btnOnclick ? `onclick="${btnOnclick}"` : ''}>${btnText}</button>
        ${retractHtml}
        <div class="vote-count" id="vote-count-${p.id}"><span>${voteCount}</span> ${voteCount === 1 ? 'glos' : 'glosow'}</div>
      </div>
      <div class="voters-list" id="voters-${p.id}">
        ${(votersByProduct[p.id] || []).map(v => `<span class="voter-badge">${typeof v === 'object' ? v.full : v}</span>`).join('')}
      </div>
      <div class="gallery-container">
        <div class="gallery-main" onclick="openLightbox(${pi})">
          <button class="gallery-nav prev" onclick="event.stopPropagation();navGallery(${pi},-1)">&#8249;</button>
          <img id="main-img-${pi}" src="${p.images[0]}" alt="${p.name}" loading="lazy">
          <button class="gallery-nav next" onclick="event.stopPropagation();navGallery(${pi},1)">&#8250;</button>
          <div class="gallery-counter" id="counter-${pi}">1 / ${p.images.length}</div>
        </div>
        <div class="gallery-thumbs" id="thumbs-${pi}">
          ${p.images.map((img, ii) => `
            <div class="thumb ${ii === 0 ? 'active' : ''}" onclick="goToImage(${pi},${ii})" id="thumb-${pi}-${ii}">
              <img src="${img}" alt="Miniatura ${ii+1}" loading="lazy">
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
  }).join('');

  applyResultsVisibility();
}

function updateVoteUI() {
  const totalVotes = Object.values(votes).reduce((s, v) => s + v, 0);
  const myVotes = getMyVotes();

  products.forEach(p => {
    const count = votes[p.id] || 0;
    const countEl = document.getElementById(`vote-count-${p.id}`);
    if (countEl) {
      countEl.innerHTML = `<span>${count}</span> ${count === 1 ? 'glos' : 'glosow'}`;
    }
    const card = document.getElementById(`card-${p.id}`);
    if (card) {
      card.classList.toggle('voted-for', myVotes.includes(p.id));
    }
  });

  updateRanking(totalVotes);
  applyResultsVisibility();
}

function updateRanking(totalVotes) {
  const section = document.getElementById('ranking-section');
  const barsEl = document.getElementById('ranking-bars');
  if (!totalVotes) {
    section.style.display = 'none';
    return;
  }
  // Always render bars HTML; visibility controlled by applyResultsVisibility()
  const sorted = products.map(p => ({
    name: p.name,
    id: p.id,
    votes: votes[p.id] || 0
  })).sort((a, b) => b.votes - a.votes);
  const maxVotes = sorted[0].votes || 1;

  barsEl.innerHTML = sorted.map(item => {
    const pct = Math.round((item.votes / maxVotes) * 100);
    const voters = (votersByProduct[item.id] || []).map(v => v.full).join(', ');
    return `
    <div class="ranking-row">
      <div class="ranking-label">${item.name}</div>
      <div class="ranking-bar-bg">
        <div class="ranking-bar-fill" style="width:${pct}%"></div>
        <div class="ranking-votes"><span class="ranking-vote-count">${item.votes}</span>${voters ? '<span class="ranking-voters-span"> · ' + voters + '</span>' : ''}</div>
      </div>
    </div>`;
  }).join('');

  // After rendering, check if voter names overflow and hide them if so
  requestAnimationFrame(() => {
    document.querySelectorAll('.ranking-votes').forEach(el => {
      const voterSpan = el.querySelector('.ranking-voters-span');
      if (!voterSpan) return;
      // Show it first to measure
      voterSpan.style.display = '';
      // Check if the text overflows the bar
      if (el.scrollWidth > el.parentElement.clientWidth - 20) {
        voterSpan.style.display = 'none';
      }
    });
  });
}

// ============================================================
// Voting logic (code-based, 2 votes per code)
// ============================================================
function castVote(productId) {
  if (!activeCode || remainingVotes() <= 0) return;
  if (getMyVotes().includes(productId)) return; // already voted for this one
  if (!firebaseReady) return;

  // Atomically update code usage AND vote count
  const codeRef = db.ref('codes/' + activeCode);
  codeRef.transaction(current => {
    if (!current) return current;
    const v = current.votes || [];
    if (v.length >= MAX_VOTES) return; // abort
    if (v.includes(productId)) return; // abort - already voted for this
    v.push(productId);
    current.votes = v;
    current.used = v.length;
    return current;
  }, (error, committed) => {
    if (error || !committed) {
      alert('Blad podczas glosowania. Sprobuj ponownie.');
      return;
    }
    // Now increment vote counter
    db.ref('votes/' + productId).transaction(c => (c || 0) + 1);

    // Update local state
    codeData.votes.push(productId);
    codeData.used = codeData.votes.length;

    const rem = remainingVotes();
    const status = document.getElementById('code-status');
    if (rem > 0) {
      status.innerHTML = `Kod aktywny! <span class="votes-remaining">Pozostalo glosow: ${rem}</span>`;
    } else {
      status.innerHTML = `Wszystkie glosy oddane! Dziekujemy.`;
    }

    renderProducts();
  });
}

// ============================================================
// Retract vote
// ============================================================
function retractVote(productId) {
  if (!activeCode || !firebaseReady) return;
  const myVotes = getMyVotes();
  const idx = myVotes.indexOf(productId);
  if (idx === -1) return;

  // Remove one instance of this vote from code
  const codeRef = db.ref('codes/' + activeCode);
  codeRef.transaction(current => {
    if (!current) return current;
    const v = current.votes || [];
    const removeIdx = v.indexOf(productId);
    if (removeIdx === -1) return; // abort
    v.splice(removeIdx, 1);
    current.votes = v;
    current.used = v.length;
    return current;
  }, (error, committed) => {
    if (error || !committed) {
      alert('Blad podczas wycofywania glosu.');
      return;
    }
    // Decrement vote counter
    db.ref('votes/' + productId).transaction(c => Math.max((c || 0) - 1, 0));

    // Update local state
    const localIdx = codeData.votes.indexOf(productId);
    if (localIdx !== -1) codeData.votes.splice(localIdx, 1);
    codeData.used = codeData.votes.length;

    const rem = remainingVotes();
    const status = document.getElementById('code-status');
    status.innerHTML = `Glos wycofany! <span class="votes-remaining">Pozostalo glosow: ${rem}</span>`;

    renderProducts();
  });
}

// ============================================================
// Firebase real-time listener
// ============================================================
function initFirebaseListeners() {
  if (!firebaseReady) {
    document.getElementById('firebase-error').style.display = 'block';
    return;
  }

  votesRef.on('value', snapshot => {
    const data = snapshot.val() || {};
    products.forEach(p => {
      votes[p.id] = data[p.id] || 0;
    });
    updateVoteUI();
  });

  // Listen to codes to show who voted
  db.ref('codes').on('value', snapshot => {
    const allCodes = snapshot.val() || {};
    // Reset
    products.forEach(p => votersByProduct[p.id] = []);
    // Build voter lists
    Object.entries(allCodes).forEach(([name, data]) => {
      const v = data.votes || [];
      v.forEach(productId => {
        if (votersByProduct[productId]) {
          votersByProduct[productId].push({
            initials: nameToInitials(name),
            full: nameToDisplay(name)
          });
        }
      });
    });
    // Update product voter badges (full names)
    products.forEach(p => {
      const el = document.getElementById(`voters-${p.id}`);
      if (el) {
        el.innerHTML = votersByProduct[p.id].map(v => `<span class="voter-badge">${v.full}</span>`).join('');
      }
    });
    // Update ranking and apply visibility
    updateRanking(Object.values(votes).reduce((s,v) => s+v, 0));
    applyResultsVisibility();
  });

  tryRestoreCode();
}

// ============================================================
// Gallery functions
// ============================================================
function goToImage(pi, ii) {
  const p = products[pi];
  galleryState[pi] = ii;
  document.getElementById(`main-img-${pi}`).src = p.images[ii];
  document.getElementById(`counter-${pi}`).textContent = `${ii+1} / ${p.images.length}`;
  const thumbs = document.getElementById(`thumbs-${pi}`).children;
  for (let t of thumbs) t.classList.remove('active');
  document.getElementById(`thumb-${pi}-${ii}`).classList.add('active');
}

function navGallery(pi, dir) {
  const p = products[pi];
  let idx = galleryState[pi] + dir;
  if (idx < 0) idx = p.images.length - 1;
  if (idx >= p.images.length) idx = 0;
  goToImage(pi, idx);
}

// Lightbox
let lbProduct = 0;
let lbIndex = 0;

function openLightbox(pi) {
  lbProduct = pi;
  lbIndex = galleryState[pi];
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  const p = products[lbProduct];
  lbIndex += dir;
  if (lbIndex < 0) lbIndex = p.images.length - 1;
  if (lbIndex >= p.images.length) lbIndex = 0;
  updateLightbox();
}

function updateLightbox() {
  const p = products[lbProduct];
  document.getElementById('lightbox-img').src = p.images[lbIndex];
  document.getElementById('lightbox-counter').textContent = `${p.name} - ${lbIndex+1} / ${p.images.length}`;
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (lb.classList.contains('open')) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
  }
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// Init
renderProducts();
initFirebaseListeners();
applyResultsVisibility();
</script>
